<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Details - Shri Radha Travels</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body {
            background-color: #0b0f19;
            color: #ffffff;
            padding: 20px;
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .trip-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .trip-header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #fff;
        }

        .trip-meta {
            color: #9ca3af;
            font-size: 14px;
        }

        .booking-card, .experience-card {
            background: #131b2e;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
        }

        .card-title {
            font-size: 20px;
            color: #fbbf24;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .card-subtitle {
            font-size: 15px;
            color: #e2e8f0;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 18px;
            position: relative;
            z-index: 10;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .trip-type-container {
            display: flex;
            gap: 12px;
        }

        /* 100% Clickable & Force-Enabled Buttons */
        .trip-btn {
            flex: 1;
            padding: 14px;
            background: #0f172a;
            border: 2px solid #334155;
            color: #94a3b8;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            z-index: 999;
            pointer-events: auto !important;
            transition: all 0.2s ease;
        }

        .trip-btn.active {
            border-color: #fbbf24;
            color: #ffffff;
            background: #1e293b;
            box-shadow: 0 0 12px rgba(251, 191, 36, 0.2);
        }

        .input-field {
            width: 100%;
            padding: 12px 15px;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 10px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            position: relative;
            z-index: 999;
            pointer-events: auto !important;
        }

        .input-field:focus {
            border-color: #fbbf24;
        }

        .book-submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #fbbf24, #d97706);
            border: none;
            border-radius: 10px;
            color: #0b0f19;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            z-index: 999;
            pointer-events: auto !important;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3);
            margin-top: 10px;
        }

        .book-submit-btn:active {
            transform: scale(0.98);
        }

        .experience-card p {
            color: #cbd5e1;
            font-size: 14px;
            line-height: 1.6;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="trip-header">
            <h1 id="placeTitle">Explore Trip</h1>
            <div class="trip-meta" id="placeLocation">📍 Loading Destination...</div>
        </div>

        <div class="booking-card">
            <div class="card-title">Book This Trip</div>
            <div class="card-subtitle" id="subPlaceTitle">Trip Package</div>

            <div class="form-group">
                <label>Trip Type</label>
                <div class="trip-type-container">
                    <button type="button" class="trip-btn active" id="oneWayBtn">One Way</button>
                    <button type="button" class="trip-btn" id="roundTripBtn">Round Trip</button>
                </div>
            </div>

            <div class="form-group">
                <label>Select Date</label>
                <input type="date" class="input-field" id="tripDate">
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" class="input-field" id="phoneInput" placeholder="Enter your phone number">
            </div>

            <button type="button" class="book-submit-btn" id="bookNowBtn">Book Now</button>
        </div>

        <div class="experience-card">
            <div class="card-title" style="font-size: 18px;">About This Experience</div>
            <p id="placeDescription">Discover breathtaking landscapes and rich culture with Shri Radha Travels.</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const placeKey = urlParams.get('place') || 'Shimla';

        const locationsData = {
            "Shimla": { title: "Shimla Trip", location: "Himachal Pradesh, India | ⭐ 4.8", description: "Explore the Queen of Hills with scenic beauty, colonial architecture, and lush green valleys." },
            "Manali": { title: "Manali Adventure Trip", location: "Himachal Pradesh, India | ⭐ 4.9", description: "Experience snow-capped mountains, thrilling adventure sports in Solang Valley, and Rohtang Pass." },
            "Spiti-Valley": { title: "Spiti Valley Expedition", location: "Himachal Pradesh, India | ⭐ 4.9", description: "Journey through rugged cold desert mountains, ancient monasteries, and high-altitude lakes." },
            "Dalhousie": { title: "Dalhousie Peaceful Getaway", location: "Himachal Pradesh, India | ⭐ 4.7", description: "Relax amidst pine-clad valleys, colonial-era buildings, and gorgeous sunset viewpoints." },
            "Dehradun": { title: "Dehradun Nature Tour", location: "Uttarakhand, India | ⭐ 4.6", description: "Enjoy pleasant weather, picturesque waterfalls, caves, and a gateway to several hill stations." },
            "Delhi": { title: "Delhi Heritage & Food Walk", location: "Delhi, India | ⭐ 4.7", description: "Dive into rich history with majestic monuments, bustling street markets, and famous street food." },
            "Amritsar": { title: "Amritsar Cultural Tour", location: "Punjab, India | ⭐ 4.9", description: "Pay respects at the divine Golden Temple and experience the patriotic fervor at Wagah Border." },
            "Mussoorie": { title: "Mussoorie Queen of Hills", location: "Uttarakhand, India | ⭐ 4.8", description: "Stroll down Mall Road, visit Kempty Falls, and witness breathtaking views of the Doon Valley." },
            "Jaipur": { title: "Jaipur Royal Pink City Tour", location: "Rajasthan, India | ⭐ 4.8", description: "Explore majestic forts, royal palaces, rich Rajasthani heritage, and vibrant local bazaars." }
        };

        const currentData = locationsData[placeKey] || locationsData["Shimla"];
        document.getElementById('placeTitle').innerText = currentData.title;
        document.getElementById('subPlaceTitle').innerText = currentData.title;
        document.getElementById('placeLocation').innerText = "📍 " + currentData.location;
        document.getElementById('placeDescription').innerText = currentData.description;

        document.getElementById('tripDate').value = new Date().toISOString().split('T')[0];

        // Direct Touch/Click Action Handlers
        const oneWayBtn = document.getElementById('oneWayBtn');
        const roundTripBtn = document.getElementById('roundTripBtn');
        const bookNowBtn = document.getElementById('bookNowBtn');
        const phoneInput = document.getElementById('phoneInput');

        oneWayBtn.onclick = function() {
            oneWayBtn.classList.add('active');
            roundTripBtn.classList.remove('active');
        };

        roundTripBtn.onclick = function() {
            roundTripBtn.classList.add('active');
            oneWayBtn.classList.remove('active');
        };

        bookNowBtn.onclick = function() {
            const phone = phoneInput.value.trim();
            if (phone === "" || phone.length < 10) {
                alert("Please enter a valid 10-digit phone number!");
                phoneInput.focus();
                return;
            }
            alert("🎉 Success! Your booking for " + currentData.title + " has been received.");
            phoneInput.value = "";
        };
    </script>
</body>
</html>
