<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destination Details - Shri Radha Travels</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #fff;
            line-height: 1.6;
            padding-bottom: 40px;
        }

        .top-bar {
            background: rgba(11, 15, 25, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            color: #fff;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-bar a {
            color: #d4af37;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hero-banner {
            height: 260px;
            background: linear-gradient(to bottom, rgba(11, 15, 25, 0.3), rgba(11, 15, 25, 0.95)), url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1200&q=80') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            border-bottom: 2px solid #d4af37;
        }

        .hero-banner h1 {
            font-size: 2.2rem;
            color: #d4af37;
            margin-bottom: 6px;
            text-transform: capitalize;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.6);
            animation: fadeInDown 0.8s ease;
        }

        .hero-banner p {
            font-size: 0.9rem;
            max-width: 600px;
            color: #e2e8f0;
            animation: fadeInUp 0.8s ease;
        }

        .container {
            max-width: 500px;
            margin: -20px auto 0 auto;
            padding: 0 15px;
            position: relative;
            z-index: 10;
        }

        /* Premium Glass/Card Box Container */
        .places-card-box {
            background: #ffffff;
            color: #1e293b;
            border-radius: 24px;
            padding: 22px 18px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 1px solid rgba(212, 175, 55, 0.3);
            animation: fadeIn 0.8s ease;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 12px;
        }

        .section-header h2 {
            font-size: 1.2rem;
            color: #0b0f19;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-header h2 i {
            color: #d4af37;
        }

        /* Individual Attraction Card Style */
        .place-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 14px 12px;
            margin-bottom: 10px;
            background: #f8fafc;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
            animation: slideUp 0.5s ease both;
        }

        .place-item:hover {
            border-color: #d4af37;
            background: #fffdf4;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.15);
        }

        /* Staggered entrance animation index-wise */
        .place-item:nth-child(1) { animation-delay: 0.05s; }
        .place-item:nth-child(2) { animation-delay: 0.1s; }
        .place-item:nth-child(3) { animation-delay: 0.15s; }
        .place-item:nth-child(4) { animation-delay: 0.2s; }
        .place-item:nth-child(5) { animation-delay: 0.25s; }
        .place-item:nth-child(6) { animation-delay: 0.3s; }
        .place-item:nth-child(7) { animation-delay: 0.35s; }

        .place-number {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            color: #b45309;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
            box-shadow: 0 2px 6px rgba(180, 83, 9, 0.2);
        }

        .place-info h3 {
            font-size: 0.95rem;
            color: #0f172a;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .place-info p {
            font-size: 0.8rem;
            color: #64748b;
            line-height: 1.35;
        }

        .cta-box {
            background: linear-gradient(135deg, #1e3a8a, #0b0f19);
            color: #fff;
            padding: 24px;
            border-radius: 20px;
            text-align: center;
            margin-top: 25px;
            border: 1.5px solid #d4af37;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .cta-box h3 {
            color: #d4af37;
            margin-bottom: 6px;
            font-size: 1.15rem;
        }

        .cta-box p {
            font-size: 0.82rem;
            color: #cbd5e1;
            margin-bottom: 15px;
        }

        .btn-book {
            display: inline-block;
            background: linear-gradient(135deg, #d4af37, #aa8c2c);
            color: #0b0f19;
            padding: 11px 28px;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 30px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
            transition: 0.3s ease;
        }

        .btn-book:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.6);
        }

        /* Keyframes */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <span>✨ Shri Radha Travels</span>
        <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Home</a>
    </div>

    <div class="hero-banner">
        <h1 id="place-name">Loading...</h1>
        <p>Discover top-rated destinations with ultimate luxury and comfort.</p>
    </div>

    <div class="container">
        <div class="places-card-box">
            <div class="section-header">
                <h2><i class="fa-solid fa-map-location-dot"></i> Places to Visit</h2>
                <span id="places-count" style="font-size: 0.8rem; color: #b45309; font-weight: 600; background: #fef3c7; padding: 4px 10px; border-radius: 20px;">Top attractions</span>
            </div>

            <div id="places-list">
                <!-- Data will be loaded dynamically -->
            </div>
        </div>

        <div class="cta-box">
            <h3>Ready to Book Your Journey?</h3>
            <p>Customize your tour package with Shri Radha Travels for an unforgettable experience.</p>
            <a href="tel:+916280544730" class="btn-book"><i class="fa-solid fa-phone"></i> Call Now to Book</a>
        </div>
    </div>

    <script>
        // Comprehensive database containing all famous attractions for each destination
        const destinationData = {
            "shimla": [
                { name: "Jakhu Temple", desc: "Hilltop Hanuman temple featuring a giant statue and panoramic views of Shimla." },
                { name: "Mall Road", desc: "Shimla's lively heart lined with heritage shops, fine cafes, and colonial-era charm." },
                { name: "Indian Institute of Advanced Study", desc: "Historic academic landmark set inside a magnificent Victorian-era British building." },
                { name: "Chadwick Falls", desc: "A serene and refreshing waterfall tucked away amidst dense deodar forests." },
                { name: "Kufri", desc: "Scenic hill station famous for thrilling winter sports, yak rides, and snow views." },
                { name: "Christ Church", desc: "Second oldest church in North India known for its neo-Gothic architecture." },
                { name: "Scandal Point", desc: "Historic square where Mall Road meets Ridge road with stunning sunset views." }
            ],
            "manali": [
                { name: "Solang Valley", desc: "Hub for adventure sports like paragliding, zorbing, and breathtaking snow peaks." },
                { name: "Rohtang Pass", desc: "High mountain pass offering majestic glacier views and year-round snow landscapes." },
                { name: "Hadimba Temple", desc: "Ancient wooden temple uniquely built inside a quiet, dense dhungri van cedar forest." },
                { name: "Old Manali", desc: "Charming village vibe filled with aesthetic cafes, live music, and apple orchards." },
                { name: "Jogini Waterfalls", desc: "A scenic trekking trail leading to a pristine, cascading waterfall stream." },
                { name: "Vashisht Hot Water Springs", desc: "Natural sulphur springs known for their traditional medicinal and healing properties." },
                { name: "Atal Tunnel", desc: "Engineering marvel connecting Manali to Lahaul-Spiti through high altitude." }
            ],
            "spiti-valley": [
                { name: "Key Monastery", desc: "Famed Tibetan Buddhist monastery perched high on a conical hill overlooking the river." },
                { name: "Chandratal Lake", desc: "Mesmerizing high-altitude crescent lake reflecting crystal clear blue skies." },
                { name: "Kaza", desc: "The vibrant commercial hub of Spiti surrounded by dramatic barren mountain slopes." },
                { name: "Hikkim", desc: "Home to the world's highest post office located in a remote high-altitude village." },
                { name: "Langza Village", desc: "Famous for fossil hunting and giant Buddha statue overlooking the valley." },
                { name: "Pin Valley National Park", desc: "High altitude cold desert park home to the snow leopard and unique flora." }
            ],
            "dalhousie": [
                { name: "Khajjiar", desc: "Often called the 'Mini Switzerland of India', featuring lush green meadows and a lake." },
                { name: "Panchpula", desc: "Scenic spot known for natural water springs, monuments, and flowing streams." },
                { name: "Dainkund Peak", desc: "Highest peak in Dalhousie offering 360-degree views of the green valleys." },
                { name: "Kalatop Wildlife Sanctuary", desc: "Dense forested reserve housing diverse wildlife and beautiful walking trails." },
                { name: "St. John's Church", desc: "Historic British-era church showcasing gorgeous stained-glass windows." }
            ],
            "dehradun": [
                { name: "Robber's Cave", desc: "Natural river cave formation where water flows mysteriously out of a narrow gorge." },
                { name: "Sahastradhara", desc: "Famous 'thousand-fold springs' known for therapeutic sulphur water pools." },
                { name: "Mindrolling Monastery", desc: "One of India's largest Buddhist centers featuring stunning architecture and gardens." },
                { name: "Tapkeshwar Temple", desc: "Ancient cave temple dedicated to Lord Shiva situated by a river stream." },
                { name: "Rajaji National Park Safari", desc: "Renowned wildlife reserve famous for Asian elephants and diverse fauna." }
            ],
            "delhi": [
                { name: "India Gate", desc: "Iconic war memorial standing tall at the heart of the national capital." },
                { name: "Qutub Minar", desc: "Towering 73-meter victory minaret showcasing brilliant historic Mughal architecture." },
                { name: "Red Fort", desc: "Magnificent red sandstone fortress representing centuries of Indian history." },
                { name: "Lotus Temple", desc: "Stark white architectural marvel shaped like a lotus flower open to all faiths." },
                { name: "Akshardham Temple", desc: "Grand spiritual-cultural complex featuring stunning carvings and boat rides." },
                { name: "Chandni Chowk", desc: "Historic bustling street market famous for street food and traditional shopping." }
            ],
            "amritsar": [
                { name: "Golden Temple", desc: "The holiest Sikh shrine glowing brilliantly with spiritual peace and architecture." },
                { name: "Jallianwala Bagh", desc: "Historic public garden and national memorial site with deep historical significance." },
                { name: "Wagah Border", desc: "Fascinating daily military Beating Retreat ceremony held at the international border." },
                { name: "Partition Museum", desc: "Poignant museum documenting the stories and history of the 1947 partition." },
                { name: "Durgiana Temple", desc: "Hindu temple mirroring the architectural elegance of the Golden Temple." }
            ],
            "mussoorie": [
                { name: "Kempty Falls", desc: "Famous cascading waterfall surrounded by high cliffs, popular for relaxing dips." },
                { name: "Mall Road Mussoorie", desc: "Bustling colonial hill station promenade with shops, eateries, and valley views." },
                { name: "Lal Tibba", desc: "The highest vantage point in Mussoorie providing telescopes to view snow peaks." },
                { name: "Gun Hill Point", desc: "Second highest peak accessible via ropeway offering stunning Doon valley views." },
                { name: "Company Garden", desc: "Vibrant picnic spot featuring manicured flower gardens, artificial lake, and rides." },
                { name: "Camel's Back Road", desc: "Scenic nature walk path named after a rock formation shaped like a camel's hump." }
            ],
            "jaipur": [
                { name: "Amber Fort", desc: "Majestic hilltop fort featuring grand artistic Hindu style architectural elements." },
                { name: "Hawa Mahal", desc: "The iconic 'Palace of Winds' built with a unique honeycomb facade of 953 windows." },
                { name: "City Palace", desc: "A sprawling royal residence blending Rajasthani and Mughal architectural designs." },
                { name: "Jantar Mantar", desc: "UNESCO World Heritage site featuring the world's largest stone astronomical observatory." },
                { name: "Nahargarh Fort", desc: "Scenic hilltop fort offering mesmerizing panoramic sunset views over Jaipur city." },
                { name: "Albert Hall Museum", desc: "Oldest museum in Rajasthan displaying rich heritage artifacts and paintings." }
            ]
        };

        // Get place from URL
        const params = new URLSearchParams(window.location.search);
        const placeKey = params.get('place') ? params.get('place').toLowerCase() : 'shimla';
        const formattedTitle = placeKey.replace(/-/g, ' ');

        // Set title and heading
        document.getElementById('place-name').innerText = formattedTitle;
        document.title = `${formattedTitle} - Shri Radha Travels`;

        // Populate dynamic places list
        const placesContainer = document.getElementById('places-list');
        const selectedPlaces = destinationData[placeKey] || destinationData['shimla'];

        document.getElementById('places-count').innerText = `Top ${selectedPlaces.length} attractions`;

        let listHTML = '';
        selectedPlaces.forEach((item, index) => {
            listHTML += `
                <div class="place-item">
                    <div class="place-number">${index + 1}</div>
                    <div class="place-info">
                        <h3>${item.name}</h3>
                        <p>${item.desc}</p>
                    </div>
                </div>
            `;
        });

        placesContainer.innerHTML = listHTML;
    </script>
</body>
</html>
