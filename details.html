<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destination Details - Shri Radha Travels</title>
    <!-- Google Fonts (Playball & Poppins) -->
    <link href="https://fonts.googleapis.com/css2?family=Playball&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #060913;
            --card-bg: rgba(18, 24, 38, 0.7);
            --gold: #d4af37;
            --gold-light: #f3e5ab;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-gold: rgba(212, 175, 55, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Original Header Style */
        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 10px 0;
        }

        .brand-title {
            font-family: 'Playball', cursive;
            color: var(--gold);
            font-size: 26px;
        }

        .home-btn {
            background: transparent;
            border: 1px solid var(--border-gold);
            color: var(--gold-light);
            padding: 6px 16px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .home-btn:hover {
            background: var(--gold);
            color: var(--bg-color);
        }

        /* Original Top Card Style */
        .detail-card {
            background: var(--card-bg);
            border: 1px solid var(--border-gold);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            margin-bottom: 25px;
        }

        .destination-title {
            font-size: 26px;
            font-weight: 600;
            color: var(--gold);
            margin-bottom: 12px;
        }

        .destination-desc {
            font-size: 15px;
            line-height: 1.7;
            color: var(--text-muted);
        }

        /* Newly Styled Unique Bottom CTA Section */
        .cta-box {
            background: linear-gradient(135deg, rgba(26, 35, 58, 0.95) 0%, rgba(10, 14, 26, 0.98) 100%);
            border: 1px solid var(--gold);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .cta-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 8px;
        }

        .cta-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .cta-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-call {
            background: var(--gold);
            color: #060913;
            border: none;
        }

        .btn-call:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-whatsapp {
            background: #25d366;
            color: #ffffff;
            border: none;
        }

        .btn-whatsapp:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        @media (max-width: 480px) {
            .cta-buttons {
                flex-direction: column;
            }
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Navigation Header -->
        <header class="nav-header">
            <div class="brand-title">✨ Shri Radha Travels</div>
            <a href="index.html" class="home-btn">← Home</a>
        </header>

        <!-- Destination Detail Card (Original Look Preserved) -->
        <main class="detail-card">
            <h1 class="destination-title" id="dest-title">Destination Details</h1>
            <p class="destination-desc" id="dest-desc">
                Loading destination details...
            </p>
        </main>

        <!-- Unique Bottom CTA Section with Call & WhatsApp -->
        <section class="cta-box">
            <h2 class="cta-title">Curate Your Royal Journey Today</h2>
            <p class="cta-subtitle">
                Allow our elite travel concierges to craft a bespoke, tailor-made itinerary designed exclusively for your royal retreat.
            </p>
            <div class="cta-buttons">
                <a href="tel:+919876543210" class="btn btn-call">
                    📞 Call Now to Book
                </a>
                <a href="https://wa.me/919876543210?text=Hello%20Shri%20Radha%20Travels,%20I%20would%20like%20to%20customize%20a%20luxury%20tour%20package." target="_blank" class="btn btn-whatsapp">
                    💬 WhatsApp Inquiry
                </a>
            </div>
        </section>
    </div>

    <script>
        // Dynamic Content Loading via URLSearchParams
        const params = new URLSearchParams(window.location.search);
        const destination = params.get('dest');

        const destinationsData = {
            'atal-tunnel': {
                title: 'Atal Tunnel',
                desc: 'Engineering marvel connecting Manali to Lahaul-Spiti through high altitude.'
            },
            'vashisht': {
                title: 'Vashisht Hot Water Springs',
                desc: 'Natural sulphur springs known for their traditional medicinal and healing properties.'
            }
        };

        if (destination && destinationsData[destination]) {
            document.getElementById('dest-title').innerText = destinationsData[destination].title;
            document.getElementById('dest-desc').innerText = destinationsData[destination].desc;
        }
    </script>
</body>
</html>
