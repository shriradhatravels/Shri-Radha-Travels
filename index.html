<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shri Radha Travels | Luxury Travel</title>

<meta name="description" content="Premium Taxi & Tour Services">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Loading Screen -->



<!-- Navbar -->



<!-- Hero Section -->
<section class="hero" id="home">

    <div class="hero-slider">

        <div class="slide active"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="overlay"></div>

    </div>

    <div class="hero-content">

        <h1>
            Shri Radha
            <span>Travels</span>
        </h1>

        <p>
            Premium Taxi Service • Tour Packages • Outstation Trips
        </p>

        <div class="hero-buttons">

            <a href="#book" class="btn-primary">
                Book Now
            </a>

            <a href="tel:+916280544730" class="btn-secondary">
                Call Now
            </a>

        </div>

    </div>

</section>


<!-- Booking Form -->
<section class="booking-section" id="book">

<div class="booking-card">

<h2>Book Your Ride</h2>

<div class="trip-type">

<button class="active">
One Way
</button>

<button>
Round Trip
</button>

</div>

<form>

<input
type="text"
placeholder="Pickup Location">

<input
type="text"
placeholder="Drop Location">

<input
type="date">

<input
type="time">

<input
type="tel"
placeholder="Phone Number">

<button type="submit">

Book Now

</button>

</form>

</div>

</section>


<script src="script.js"></script>

</body>

</html>
