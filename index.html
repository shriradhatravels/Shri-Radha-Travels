<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shri Radha Travels | Luxury Travel Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="loader-content">
            <img src="logo.png" alt="Shri Radha Travels Logo" class="loader-logo">
            <h1>SHRI RADHA TRAVELS</h1>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="logo-box">
            <img src="logo.png" alt="Logo" class="nav-logo">
            <span class="brand-name">SHRI RADHA TRAVELS</span>
        </div>
        <ul class="nav-menu">
            <li><a href="#home">Home</a></li>
            <li><a href="#fleet">Fleet</a></li>
            <li><a href="#destinations">Destinations</a></li>
            <li><a href="#packages">Tour Packages</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
        <a href="#book" class="btn-primary">Book Now</a>
    </nav>

    <!-- Hero Section -->
    <header id="home" class="hero">
        <div class="hero-content">
            <h1>SHRI RADHA TRAVELS</h1>
            <p>Premium Luxury Travel & Cab Services</p>
            
            <!-- Booking Form -->
            <div class="booking-card">
                <form id="bookingForm">
                    <select>
                        <option>One Way</option>
                        <option>Round Trip</option>
                    </select>
                    <input type="text" placeholder="Pickup Location">
                    <input type="text" placeholder="Drop Location">
                    <input type="date">
                    <button type="submit" class="btn-gold">Book Now</button>
                </form>
            </div>
        </div>
    </header>

    <script src="script.js"></script>
</body>
</html>
