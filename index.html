<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shri Radha Travels | Luxury Travel</title>
    <meta name="description" content="Premium Taxi & Tour Services">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Loading Screen -->

<!-- Navbar -->

<!-- Hero Section -->
<!-- Hero Section with Responsive Scrolling & Deep Blue Theme -->
<section class="hero" id="home" style="position: relative; min-height: 45vh; display: flex; align-items: flex-start; padding: 20px 15px; box-sizing: border-box; width: 100%;">
    
    <div class="hero-slider" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;">
        <div class="slide active" style="width: 100%; height: 100%; background-size: cover; background-position: center;"></div>
        <div class="overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5);"></div>
    </div>

    <!-- Responsive Container that scrolls naturally with all screen sizes -->
    <div class="hero-content" style="position: relative; z-index: 10; width: 100%; max-width: 600px; margin: 0 auto; background: rgba(30, 58, 138, 0.9); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 2px solid #d4af37; border-radius: 16px; padding: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.4); text-align: left; box-sizing: border-box;">
        
        <h1 style="font-size: clamp(22px, 4vw, 32px); font-weight: 800; color: white; margin: 0; line-height: 1.2; letter-spacing: 0.5px;">
            Shri Radha <span style="color: #d4af37; display: inline-block;">Travels</span>
        </h1>
        
        <div style="width: 50px; height: 3px; background: #d4af37; margin: 8px 0 10px 0; border-radius: 2px;"></div>

        <p style="font-size: clamp(12px, 2vw, 14px); color: #e2e8f0; margin: 0; font-weight: 500; letter-spacing: 0.3px; line-height: 1.4;">
            ✨ Experience Ultimate Luxury • Verified Chauffeurs • 24/7 Outstation & Tour Packages
        </p>
        
    </div>

</section>

<!-- Booking Form Section -->
<section class="booking-section" id="book" style="display: flex; justify-content: center; align-items: center; padding: 40px 20px;">
    
    <!-- Input Focus & Toggle Style Script -->
    <style>
        .gold-input:focus, .gold-select:focus {
            background-color: #1e3a8a !important; /* Dark Blue */
            color: white !important;
            outline: none;
        }
        .gold-input:focus::placeholder {
            color: #cbd5e1 !important;
        }
    </style>

    <script>
    document.addEventListener("DOMContentLoaded", function() {
        const tripButtons = document.querySelectorAll('.trip-btn');
        tripButtons.forEach(button => {
            button.addEventListener('click', function() {
                tripButtons.forEach(btn => {
                    btn.style.background = 'transparent';
                    btn.style.color = '#d4af37';
                });
                this.style.background = '#d4af37';
                this.style.color = 'white';
            });
        });
    });
    </script>

    <div style="background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 20px; padding: 25px; width: 100%; max-width: 400px; border: 2px solid #d4af37; box-sizing: border-box; position: relative;">
        
        <h3 style="color: white; font-size: 18px; margin-top: 0; margin-bottom: 20px; text-align: center;">Book Your Experience</h3>
        
        <!-- One Way / Round Trip Interactive Buttons -->
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button type="button" class="trip-btn" style="flex: 1; padding: 12px; border: 1px solid #d4af37; background: #d4af37; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.3s ease;">One Way</button>
            <button type="button" class="trip-btn" style="flex: 1; padding: 12px; border: 1px solid #d4af37; background: transparent; color: #d4af37; border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.3s ease;">Round Trip</button>
        </div>

        <!-- Form Fields -->
        <form action="https://formspree.io/f/xkodrkqy" method="POST">
            <!-- Pickup Location -->
            <div style="margin-bottom: 12px;">
                <input type="text" name="Pickup" placeholder="Pickup Location" class="gold-input" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #d4af37; background: rgba(255,255,255,0.85); box-sizing: border-box; font-size: 14px; transition: all 0.3s ease;">
            </div>
            
            <!-- Drop Location -->
            <div style="margin-bottom: 12px;">
                <input type="text" name="Drop" placeholder="Drop Location" class="gold-input" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #d4af37; background: rgba(255,255,255,0.85); box-sizing: border-box; font-size: 14px; transition: all 0.3s ease;">
            </div>

            <!-- Passengers Dropdown (1 to 12) -->
            <div style="margin-bottom: 12px;">
                <select name="Passengers" class="gold-select" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #d4af37; background: rgba(255,255,255,0.85); box-sizing: border-box; font-size: 14px; color: #333; transition: all 0.3s ease;">
                    <option value="" disabled selected>Select Passengers</option>
                    <option value="1">1 Passenger</option>
                    <option value="2">2 Passengers</option>
                    <option value="3">3 Passengers</option>
                    <option value="4">4 Passengers</option>
                    <option value="5">5 Passengers</option>
                    <option value="6">6 Passengers</option>
                    <option value="7">7 Passengers</option>
                    <option value="8">8 Passengers</option>
                    <option value="9">9 Passengers</option>
                    <option value="10">10 Passengers</option>
                    <option value="11">11 Passengers</option>
                    <option value="12">12 Passengers</option>
                </select>
            </div>

            <!-- Vehicle Type Dropdown -->
            <div style="margin-bottom: 12px;">
                <select name="Vehicle_Type" class="gold-select" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #d4af37; background: rgba(255,255,255,0.85); box-sizing: border-box; font-size: 14px; color: #333; transition: all 0.3s ease;">
                    <option value="" disabled selected>Select Vehicle Type</option>
                    <option value="Hatchback - Toyota Glanza">Hatchback - Toyota Glanza</option>
                    <option value="Sedan - Swift Dzire">Sedan - Swift Dzire</option>
                    <option value="SUV - Maruti Ertiga">SUV - Maruti Ertiga</option>
                    <option value="MPV - Innova Crysta 7+1">MPV - Innova Crysta 7+1</option>
                    <option value="Tempo Traveller - Urbania">Tempo Traveller - Urbania</option>
                </select>
            </div>

            <!-- Phone Number -->
            <div style="margin-bottom: 15px;">
                <input type="tel" name="Phone" placeholder="Enter your phone number" class="gold-input" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #d4af37; background: rgba(255,255,255,0.85); box-sizing: border-box; font-size: 14px; transition: all 0.3s ease;">
            </div>

            <!-- Book Now Button -->
            <button type="submit" style="width: 100%; padding: 12px; background: #d4af37; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;">
                Book Now
            </button>
        </form>
    </div>
</section>

<!-- Floating Action Buttons -->

    </a>

    <!-- Call Floating Button -->
    <a href="tel:+916280544730" style="width: 50px; height: 50px; background-color: #d4af37; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-decoration: none; transition: transform 0.3s ease;">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="white" viewBox="0 0 16 16">
            <path d="M3.654 1.328a.678.678 0 0 0-1.015-.063L1.605 2.3c-.483.484-.661 1.169-.45 1.77a17.568 17.568 0 0 0 4.168 6.608 17.569 17.569 0 0 0 6.608 4.168c.601.211 1.286.033 1.77-.45l1.034-1.034a.678.678 0 0 0-.063-1.015l-2.307-1.794a.678.678 0 0 0-.58-.122l-2.19.547a1.748 1.748 0 0 1-1.657-.459L5.482 8.062a1.748 1.748 0 0 1-.46-1.657l.548-2.19a.678.678 0 0 0-.122-.58L3.654 1.328zM1.884.511a1.745 1.745 0 0 1 2.612.163L6.29 2.98c.329.423.445.974.315 1.494l-.547 2.19a.678.678 0 0 0 .178.643l2.457 2.457a.678.678 0 0 0 .643.178l2.19-.547c.52-.13 1.072.014 1.494.315l2.306 1.794c.829.645.905 1.87.163 2.611l-1.034 1.034c-.74.74-1.846 1.065-2.877.702a18.634 18.634 0 0 1-7.01-4.42 18.634 18.634 0 0 1-4.42-7.009c-.363-1.03-.038-2.137.702-2.877L1.884.511z"/>
        </svg>
    </a>
</div>
