<!-- Hero Section -->
<section id="home" class="hero">
    <!-- Hero Background Slideshow container -->
    <div class="hero-slideshow">
        <div class="slide active" style="background-image: url('travel-bg1.jpg');"></div>
    </div>
    <div class="overlay"></div>

    <div class="hero-content">
        <h1>SHRI RADHA TRAVELS</h1>
        <p>Premium Luxury Travel & Cab Services</p>
        
        <!-- Premium Glassmorphic Booking Form -->
        <div class="booking-form-wrapper">
            <form id="bookingForm">
                <div class="form-row">
                    <select name="tripType">
                        <option>One Way</option>
                        <option>Round Trip</option>
                    </select>
                    <input type="text" placeholder="Pickup Location" required>
                    <input type="text" placeholder="Drop Location" required>
                </div>
                <div class="form-row">
                    <input type="date" required>
                    <input type="time" required>
                    <input type="number" placeholder="Passengers">
                </div>
                <input type="tel" placeholder="Phone Number" required>
                <button type="submit" class="btn-book-now">Book Now</button>
            </form>
        </div>
    </div>
</section>
