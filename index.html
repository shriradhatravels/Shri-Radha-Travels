<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shri Radha Travels</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- LOADER -->
<div id="loader">
    <img src="logo.png" alt="Shri Radha Travels">
    <h1>Shri Radha Travels</h1>
</div>

<!-- HERO -->
<section class="hero">

<div class="overlay"></div>

<header>

<div class="logo">
<img src="logo.png">
<h2>Shri Radha Travels</h2>
</div>

<nav>

<a href="#">Home</a>

<a href="#">About</a>

<a href="#">Destinations</a>

<a href="#">Fleet</a>

<a href="#">Gallery</a>

<a href="#">Contact</a>

</nav>

</header>

<div class="booking-box">

<h1>Explore India With Shri Radha Travels</h1>

<p>Premium Taxi & Tour Packages</p>

<div class="trip-type">

<button>One Way</button>

<button>Round Trip</button>

<button>Airport Transfer</button>

</div>

<form>

<input type="text" placeholder="Pickup Location">

<input type="text" placeholder="Drop Location">

<input type="date">

<input type="time">

<select>

<option>Select Vehicle</option>

<option>Toyota Glanza</option>

<option>Swift Dzire</option>

<option>Ertiga</option>

<option>Innova Crysta</option>

<option>Force Urbania</option>

</select>

<button type="submit">Book Now</button>

</form>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
